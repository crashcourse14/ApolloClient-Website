<!DOCTYPE html>
<html style="width:100%;height:100%;background-color:black;">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0" />
		<meta name="description" content="EaglercraftX 1.8 test directory HTML page" />
		<meta name="keywords" content="eaglercraft, eaglercraftx, minecraft, 1.8, 1.8.8" />
		<title>EaglercraftX 1.8</title>

		<link type="image/png" rel="shortcut icon" href="favicon.png" />
		<link rel="icon" href="favicon.png" />

		<script type="text/javascript" src="/game/classes.js"></script>

		<script type="text/javascript">
			"use strict";

			window.addEventListener("load", function() {

				if (window.location.href.indexOf("file:") === 0) {
					alert("HTTP please, do not open this file locally, run a local HTTP server and load it via HTTP");
					return;
				}

				var relayId = Math.floor(Math.random() * 3);

				window.eaglercraftXOpts = {

					demoMode: false,
					container: "game_frame",
					assetsURI: "/game/assets.epk",
					localesURI: "lang/",
					worldsDB: "worlds",
					logInvalidCerts: true,
					crashOnUncaughtExceptions: true,

					localStorageLoaded: function(key) {
            if (key === "monsoon_config") {
              let data = localStorage.getItem("monsoon_config");
              if (!data) return null;

              // decode base64 → byte array format expected by Eagler
              let binary = atob(data);
              let bytes = new Uint8Array(binary.length);
              for (let i = 0; i < binary.length; i++) {
                bytes[i] = binary.charCodeAt(i);
              }
              return bytes;
            }

            let data = localStorage.getItem("cl_" + key);
            if (!data) return null;

            let binary = atob(data);
            let bytes = new Uint8Array(binary.length);
            for (let i = 0; i < binary.length; i++) {
              bytes[i] = binary.charCodeAt(i);
            }
            return bytes;
          },

          localStorageSaved: function(key, data) {
            function toBase64(bytes) {
              let binary = "";
              for (let i = 0; i < bytes.length; i++) {
                binary += String.fromCharCode(bytes[i]);
              }
              return btoa(binary);
            }

            if (key === "monsoon_config") {
              localStorage.setItem("monsoon_config", toBase64(data));
              return;
            }

            localStorage.setItem("cl_" + key, toBase64(data));
          },

					servers: [
						{ addr: "wss://smileysmp.eagler.host", name: "SmileySMP" },
						{ addr: "wss://mc.arch.lol", name: "ArchMC" },
						{ addr: "wss://fracture.eagler.host", name: "Minecraft Server" }
					],

					relays: [
						{ addr: "wss://relay.deev.is/", comment: "lax1dude relay #1", primary: relayId === 0 },
						{ addr: "wss://relay.lax1dude.net/", comment: "lax1dude relay #2", primary: relayId === 1 },
						{ addr: "wss://relay.shhnowisnottheti.me/", comment: "ayunami relay #1", primary: relayId === 2 }
					]

				};

				var q = window.location.search;

				if (typeof q === "string" && q[0] === "?" && typeof window.URLSearchParams !== "undefined") {
					q = new window.URLSearchParams(q);
					var s = q.get("server");
					if (s) window.eaglercraftXOpts.joinServer = s;
				}

				main();
			});
		</script>
	</head>

	<body style="margin:0px;width:100%;height:100%;overflow:hidden;background-color:black;" id="game_frame">
	</body>
</html>
